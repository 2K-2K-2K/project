<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конвертер валют</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">

    <h1>💱 Конвертер валют</h1>

    <form method="POST">

        <input
            type="number"
            step="0.01"
            name="amount"
            placeholder="Введите сумму"
            required>

        <select name="from_currency">

            {% for currency in currencies %}
            <option value="{{ currency }}">
                {{ currency }}
            </option>
            {% endfor %}

        </select>

        <select name="to_currency">

            {% for currency in currencies %}
            <option value="{{ currency }}">
                {{ currency }}
            </option>
            {% endfor %}

        </select>

        <button type="submit">
            Конвертировать
        </button>

    </form>

    {% if result %}
    <div class="result">
        Результат: {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
